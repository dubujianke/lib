<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>最终修正：四面斜交网格</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050811; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a1224, 0.007);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(60, 40, 80);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0x60a5fa, 0x1e293b, 1.2);
        scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xfff7ed, 2.0);
        sunLight.position.set(40, 60, 20);
        scene.add(sunLight);

        const materials = {
            coreBody: new THREE.MeshStandardMaterial({ color: 0x020617, roughness: 0.1 }),
            glassPanel: new THREE.MeshStandardMaterial({ 
                color: 0x0f172a, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.9 
            }),
            diagridFrame: new THREE.MeshStandardMaterial({ 
                color: 0xe2e8f0, roughness: 0.2, metalness: 0.9 
            })
        };

        class ProceduralBuildingFactory {
            constructor() { this.materials = materials; }

            // 修正：只生成平面的网格，不处理位移
            _createFaceMesh(width, height) {
                const cellSize = 6.0;
                const frameThick = 0.3;
                const cols = Math.ceil(width / cellSize);
                const rows = Math.ceil(height / cellSize);
                
                const group = new THREE.Group();
                const panelGeo = new THREE.PlaneGeometry(cellSize - 0.2, cellSize - 0.2);
                const barGeo = new THREE.BoxGeometry(frameThick, Math.sqrt(cellSize**2 * 2), frameThick);
                
                const panelMesh = new THREE.InstancedMesh(panelGeo, this.materials.glassPanel, cols * rows);
                const mesh1 = new THREE.InstancedMesh(barGeo, this.materials.diagridFrame, cols * rows);
                const mesh2 = new THREE.InstancedMesh(barGeo, this.materials.diagridFrame, cols * rows);
                
                let idx = 0;
                const dummy = new THREE.Object3D();
                const startX = -(cols * cellSize) / 2 + cellSize / 2;
                const startY = -(rows * cellSize) / 2 + cellSize / 2;

                for (let x = 0; x < cols; x++) {
                    for (let y = 0; y < rows; y++) {
                        dummy.position.set(startX + x * cellSize, startY + y * cellSize, 0);
                        dummy.updateMatrix();
                        panelMesh.setMatrixAt(idx, dummy.matrix);
                        dummy.rotation.set(0, 0, Math.PI / 4);
                        dummy.updateMatrix();
                        mesh1.setMatrixAt(idx, dummy.matrix);
                        dummy.rotation.set(0, 0, -Math.PI / 4);
                        dummy.updateMatrix();
                        mesh2.setMatrixAt(idx, dummy.matrix);
                        idx++;
                    }
                }
                group.add(panelMesh, mesh1, mesh2);
                return group;
            }

            _buildDiagrid(group, W, H, D) {
                const bodyH = H - 6;
                // 主体
                const body = new THREE.Mesh(new THREE.BoxGeometry(W, bodyH, D), this.materials.coreBody);
                body.position.y = 6 + bodyH / 2;
                group.add(body);

                // 定义四个面的参数 [宽度, 深度方向偏移, 旋转角度]
                const faces = [
                    { w: W, pos: new THREE.Vector3(0, 6 + bodyH/2, D/2 + 0.1), rot: new THREE.Euler(0, 0, 0) },      // 前
                    { w: W, pos: new THREE.Vector3(0, 6 + bodyH/2, -D/2 - 0.1), rot: new THREE.Euler(0, Math.PI, 0) }, // 后
                    { w: D, pos: new THREE.Vector3(W/2 + 0.1, 6 + bodyH/2, 0), rot: new THREE.Euler(0, Math.PI/2, 0) },// 右
                    { w: D, pos: new THREE.Vector3(-W/2 - 0.1, 6 + bodyH/2, 0), rot: new THREE.Euler(0, -Math.PI/2, 0) }// 左
                ];

                faces.forEach(f => {
                    const face = this._createFaceMesh(f.w, bodyH);
                    face.position.copy(f.pos);
                    face.rotation.copy(f.rot);
                    group.add(face);
                });
            }

            createBuilding(W, H, D) {
                const group = new THREE.Group();
                this._buildDiagrid(group, W, H, D);
                return group;
            }
        }

        const factory = new ProceduralBuildingFactory();
        const b1 = factory.createBuilding(24, 70, 24);
        scene.add(b1);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
